<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Al-Xorazmiy Olimpiadasi — Tayyorgarlik</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.app{max-width:900px;margin:0 auto;background:#fff;min-height:100vh;box-shadow:0 0 40px rgba(0,0,0,0.08)}
.header{background:linear-gradient(135deg,#0f6e56,#1d9e75);padding:1.25rem 1.5rem;display:flex;align-items:center;gap:14px}
.logo{width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;flex-shrink:0;border:1.5px solid rgba(255,255,255,0.3)}
.header-info h1{font-size:17px;font-weight:600;color:#fff}
.header-info p{font-size:12px;color:rgba(255,255,255,0.8);margin-top:2px}
.nav{display:flex;gap:0;border-bottom:1px solid #e8e8e2;background:#fff;position:sticky;top:0;z-index:100}
.nav-btn{padding:12px 18px;font-size:13px;border:none;background:transparent;color:#888;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;display:flex;align-items:center;gap:6px;transition:color 0.2s}
.nav-btn:hover{color:#1d9e75}
.nav-btn.active{color:#1d9e75;border-bottom-color:#1d9e75;font-weight:500}
.content{padding:1.5rem}
.page{display:none}
.page.active{display:block}

/* Home */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.stat-card{background:#f9f9f6;border:1px solid #e8e8e2;border-radius:10px;padding:1rem;text-align:center}
.stat-num{font-size:26px;font-weight:600;color:#1d9e75}
.stat-label{font-size:11px;color:#888;margin-top:3px}
.progress-bar-wrap{margin-bottom:1.5rem}
.progress-bar-wrap label{font-size:12px;color:#888;margin-bottom:6px;display:block}
.pbar{height:6px;background:#e8e8e2;border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;background:linear-gradient(90deg,#1d9e75,#5dcaa5);border-radius:3px;transition:width 0.5s}

.stage-card{border:1px solid #e8e8e2;border-radius:12px;margin-bottom:1.25rem;overflow:hidden}
.stage-header{padding:1rem 1.25rem;display:flex;align-items:center;gap:10px;border-bottom:1px solid #e8e8e2;background:#fafaf7}
.stage-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.3px}
.badge-green{background:#e1f5ee;color:#0f6e56}
.badge-amber{background:#fef3d9;color:#854f0b}
.badge-blue{background:#e6f1fb;color:#185fa5}
.stage-title{font-size:14px;font-weight:500}
.stage-desc{font-size:12px;color:#888;margin-left:auto}
.topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:0;padding:0}
.topic-btn{padding:11px 14px;border:none;border-right:1px solid #e8e8e2;border-bottom:1px solid #e8e8e2;background:#fff;cursor:pointer;text-align:left;font-size:13px;font-family:inherit;color:#333;display:flex;align-items:center;gap:8px;transition:background 0.15s;width:100%}
.topic-btn:hover{background:#f0faf6}
.topic-btn.done{background:#f0faf6}
.topic-btn.done .t-check{color:#1d9e75;opacity:1}
.t-icon{font-size:15px;color:#1d9e75;flex-shrink:0}
.t-name{flex:1;line-height:1.3}
.t-check{font-size:13px;color:#1d9e75;opacity:0;flex-shrink:0}

/* Lesson */
.lesson-header{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid #e8e8e2}
.back-btn{padding:7px 14px;border:1px solid #e8e8e2;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-family:inherit;color:#555;display:flex;align-items:center;gap:5px;transition:background 0.15s}
.back-btn:hover{background:#f5f5f0}
.lesson-title{font-size:17px;font-weight:600;flex:1}
.done-badge{padding:4px 10px;background:#e1f5ee;color:#0f6e56;border-radius:20px;font-size:12px;font-weight:500}

.tabs{display:flex;gap:0;border-bottom:1px solid #e8e8e2;margin-bottom:1.5rem}
.tab-btn{padding:9px 16px;font-size:13px;border:none;background:transparent;color:#888;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;display:flex;align-items:center;gap:5px;transition:color 0.15s}
.tab-btn:hover{color:#1d9e75}
.tab-btn.active{color:#1d9e75;border-bottom-color:#1d9e75;font-weight:500}
.tab-content{display:none}
.tab-content.active{display:block}

/* Theory */
.theory-section{margin-bottom:1.25rem}
.theory-section h3{font-size:14px;font-weight:600;color:#0f6e56;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.theory-box{border-left:3px solid #1d9e75;padding:0.875rem 1rem;background:#f8fdfb;border-radius:0 8px 8px 0;margin-bottom:0.75rem}
.theory-box p,.theory-box li{font-size:14px;line-height:1.75;color:#333}
.theory-box ul{padding-left:1.25rem}
.formula-box{background:#e1f5ee;border:1px solid #9fe1cb;border-radius:8px;padding:0.875rem 1rem;margin:0.75rem 0;text-align:center;font-size:15px;font-weight:600;color:#0f6e56;font-family:monospace;letter-spacing:0.5px}
.info-box{background:#f0f7ff;border:1px solid #b5d4f4;border-radius:8px;padding:0.875rem 1rem;margin:0.75rem 0}
.info-box p,.info-box li{font-size:13px;line-height:1.7;color:#185fa5}
.warn-box{background:#fff8ec;border:1px solid #fac775;border-radius:8px;padding:0.875rem 1rem;margin:0.75rem 0}
.warn-box p{font-size:13px;line-height:1.7;color:#854f0b}
table.theory-table{width:100%;border-collapse:collapse;font-size:13px;margin:0.75rem 0}
table.theory-table th{background:#e1f5ee;color:#0f6e56;padding:7px 10px;text-align:left;font-weight:500}
table.theory-table td{padding:7px 10px;border-bottom:1px solid #e8e8e2}
table.theory-table tr:last-child td{border-bottom:none}

/* Examples */
.example-card{border:1px solid #e8e8e2;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem;background:#fff}
.diff-row{display:flex;align-items:center;gap:5px;margin-bottom:8px}
.diff-dot{width:8px;height:8px;border-radius:50%;background:#e8e8e2}
.d-easy{background:#1d9e75}
.d-med{background:#ef9f27}
.d-hard{background:#e24b4a}
.diff-label{font-size:11px;color:#888;margin-left:3px}
.ex-q{font-size:14px;font-weight:500;margin-bottom:8px;color:#1a1a1a;line-height:1.5}
.ex-sol{font-size:13px;color:#555;line-height:1.75;background:#f9f9f6;border-radius:6px;padding:8px 10px;margin-bottom:8px}
.ex-ans{display:inline-block;padding:5px 12px;background:#e1f5ee;border-radius:6px;font-size:13px;font-weight:600;color:#0f6e56}
.examples-label{font-size:13px;font-weight:500;color:#0f6e56;margin-bottom:1rem;padding:6px 12px;background:#e1f5ee;border-radius:6px;display:inline-block}

/* Homework */
.hw-intro{background:#f9f9f6;border-radius:8px;padding:0.75rem 1rem;font-size:13px;color:#666;margin-bottom:1rem;display:flex;align-items:flex-start;gap:8px}
.hw-card{border:1px solid #e8e8e2;border-radius:10px;padding:1rem 1.25rem;margin-bottom:10px;background:#fff}
.hw-type{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600;margin-bottom:8px}
.hw-req{background:#e6f1fb;color:#185fa5}
.hw-olp{background:#fef3d9;color:#854f0b}
.hw-q{font-size:14px;line-height:1.65;color:#1a1a1a}
.mark-done-btn{margin-top:1.25rem;padding:10px 20px;background:#1d9e75;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;font-family:inherit;display:flex;align-items:center;gap:6px;transition:background 0.2s}
.mark-done-btn:hover{background:#0f6e56}

/* Test */
.test-intro{background:#f9f9f6;border-radius:8px;padding:0.75rem 1rem;font-size:13px;color:#666;margin-bottom:1rem}
.test-q-card{border:1px solid #e8e8e2;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem;background:#fff}
.test-qtext{font-size:14px;font-weight:500;margin-bottom:12px;line-height:1.55;color:#1a1a1a}
.test-opts{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.test-opt{padding:9px 13px;border:1px solid #e8e8e2;border-radius:7px;cursor:pointer;font-size:13px;background:#fafaf7;text-align:left;font-family:inherit;color:#333;transition:all 0.15s;width:100%}
.test-opt:hover:not(:disabled){background:#f0faf6;border-color:#9fe1cb}
.test-opt.selected{background:#e1f5ee;border-color:#1d9e75;color:#0f6e56}
.test-opt.correct{background:#e1f5ee;border-color:#1d9e75;color:#0f6e56;font-weight:500}
.test-opt.wrong{background:#fce8e8;border-color:#e24b4a;color:#a32d2d}
.test-opt:disabled{cursor:default}
.submit-btn{margin-top:0.5rem;padding:10px 24px;background:#1d9e75;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;font-family:inherit;display:flex;align-items:center;gap:6px}
.submit-btn:hover{background:#0f6e56}
.test-result-box{margin-top:1.25rem;padding:1.25rem;border-radius:10px;text-align:center;display:none}
.result-good{background:#e1f5ee;color:#0f6e56;border:1px solid #9fe1cb}
.result-mid{background:#fef3d9;color:#854f0b;border:1px solid #fac775}
.result-bad{background:#fce8e8;color:#a32d2d;border:1px solid #f7c1c1}
.result-score{font-size:28px;font-weight:700;margin-bottom:4px}
.result-msg{font-size:13px}

/* Progress page */
.prog-stage{margin-bottom:1.5rem}
.prog-stage-title{font-size:13px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.75rem}
.prog-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0ea}
.prog-circle{width:22px;height:22px;border-radius:50%;border:1.5px solid #e8e8e2;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:#1d9e75;background:#fff}
.prog-circle.done{background:#1d9e75;border-color:#1d9e75;color:#fff}
.prog-name{font-size:14px;color:#333;flex:1}
.prog-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:#e1f5ee;color:#0f6e56;font-weight:500}

@media(max-width:600px){
  .content{padding:1rem}
  .test-opts{grid-template-columns:1fr}
  .stat-row{grid-template-columns:repeat(3,1fr)}
  .topics-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div class="logo">AX</div>
  <div class="header-info">
    <h1>Al-Xorazmiy Olimpiadasi — Tayyorgarlik</h1>
    <p>7-sinf &nbsp;·&nbsp; 6 oylik dastur &nbsp;·&nbsp; 24 mavzu &nbsp;·&nbsp; 3 bosqich</p>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" id="nav-home" onclick="showPage('home')"><i class="ti ti-home"></i> Bosh sahifa</button>
  <button class="nav-btn" id="nav-lesson" style="display:none" onclick="showPage('lesson')"><i class="ti ti-book"></i> <span id="nav-lesson-title">Dars</span></button>
  <button class="nav-btn" id="nav-progress" onclick="showPage('progress')"><i class="ti ti-chart-bar"></i> Natijalar</button>
</div>

<div class="content">

<!-- HOME PAGE -->
<div class="page active" id="page-home">
  <div class="stat-row">
    <div class="stat-card"><div class="stat-num" id="stat-done">0</div><div class="stat-label">Bajarildi</div></div>
    <div class="stat-card"><div class="stat-num">24</div><div class="stat-label">Jami mavzu</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-pct">0%</div><div class="stat-label">Tayyorgarlik</div></div>
  </div>
  <div class="progress-bar-wrap">
    <label>Umumiy tayyorgarlik darajasi</label>
    <div class="pbar"><div class="pbar-fill" id="main-pbar" style="width:0%"></div></div>
  </div>

  <div class="stage-card">
    <div class="stage-header">
      <span class="stage-badge badge-green">1–2-oy</span>
      <span class="stage-title">Poydevor — Asosiy tushunchalar</span>
      <span class="stage-desc">10 mavzu</span>
    </div>
    <div class="topics-grid" id="grid-stage1"></div>
  </div>

  <div class="stage-card">
    <div class="stage-header">
      <span class="stage-badge badge-amber">3–4-oy</span>
      <span class="stage-title">Olimpiada usullari</span>
      <span class="stage-desc">8 mavzu</span>
    </div>
    <div class="topics-grid" id="grid-stage2"></div>
  </div>

  <div class="stage-card">
    <div class="stage-header">
      <span class="stage-badge badge-blue">5–6-oy</span>
      <span class="stage-title">Musobaqa rejimi</span>
      <span class="stage-desc">6 mavzu</span>
    </div>
    <div class="topics-grid" id="grid-stage3"></div>
  </div>
</div>

<!-- LESSON PAGE -->
<div class="page" id="page-lesson">
  <div class="lesson-header">
    <button class="back-btn" onclick="showPage('home')"><i class="ti ti-arrow-left"></i> Orqaga</button>
    <span class="lesson-title" id="lesson-title">Mavzu</span>
    <span class="done-badge" id="done-badge" style="display:none"><i class="ti ti-check"></i> Bajarildi</span>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab(this,'theory')"><i class="ti ti-book-2"></i> Nazariya</button>
    <button class="tab-btn" onclick="showTab(this,'examples')"><i class="ti ti-pencil"></i> Misollar</button>
    <button class="tab-btn" onclick="showTab(this,'homework')"><i class="ti ti-clipboard-list"></i> Uyga vazifa</button>
    <button class="tab-btn" onclick="showTab(this,'test')"><i class="ti ti-clipboard-check"></i> Test</button>
  </div>
  <div class="tab-content active" id="tab-theory"></div>
  <div class="tab-content" id="tab-examples"></div>
  <div class="tab-content" id="tab-homework"></div>
  <div class="tab-content" id="tab-test"></div>
</div>

<!-- PROGRESS PAGE -->
<div class="page" id="page-progress">
  <h2 style="font-size:16px;font-weight:600;margin-bottom:1.25rem">Tayyorgarlik holati</h2>
  <div id="prog-content"></div>
</div>

</div>
</div>

<script>
const TOPICS = [
  {stage:1, id:'t1',  name:"Bo'linish va qoldiq",          icon:'ti-divide'},
  {stage:1, id:'t2',  name:"EKUB va EKUK",                  icon:'ti-git-merge'},
  {stage:1, id:'t3',  name:"Tub sonlar va kanonizatsiya",   icon:'ti-atom'},
  {stage:1, id:'t4',  name:"Oxirgi raqam topish",           icon:'ti-123'},
  {stage:1, id:'t5',  name:"Factorial va Legendre formulasi",icon:'ti-math-function'},
  {stage:1, id:'t6',  name:"Ko'paytuvchilarga ajratish",    icon:'ti-calculator'},
  {stage:1, id:'t7',  name:"Standart aynanliklar",          icon:'ti-equal'},
  {stage:1, id:'t8',  name:"Chiziqli tenglamalar va sistemalar",icon:'ti-variable'},
  {stage:1, id:'t9',  name:"Uchburchak xossalari",          icon:'ti-triangle'},
  {stage:1, id:'t10', name:"Trapetsiya, romb va to'rtburchaklar",icon:'ti-pentagon'},
  {stage:2, id:'t11', name:"Kombinatorika asoslari",         icon:'ti-git-branch'},
  {stage:2, id:'t12', name:"Kombinatsiya va joylashtirish", icon:'ti-arrows-shuffle'},
  {stage:2, id:'t13', name:"Modul bilan tenglamalar",       icon:'ti-brackets'},
  {stage:2, id:'t14', name:"Ildizli tenglamalar",           icon:'ti-square-root'},
  {stage:2, id:'t15', name:"Kvadrat tengsizliklar",         icon:'ti-greater-than'},
  {stage:2, id:'t16', name:"Bo'luvchilar soni",             icon:'ti-list-numbers'},
  {stage:2, id:'t17', name:"Simmetrik ifodalar",            icon:'ti-symmetry'},
  {stage:2, id:'t18', name:"Kabutar ini prinsipi",          icon:'ti-feather'},
  {stage:3, id:'t19', name:"Arifmetik progressiya",         icon:'ti-trending-up'},
  {stage:3, id:'t20', name:"Geometrik progressiya",         icon:'ti-chart-line'},
  {stage:3, id:'t21', name:"To'liq olimpiada testi — 1",   icon:'ti-tournament'},
  {stage:3, id:'t22', name:"To'liq olimpiada testi — 2",   icon:'ti-tournament'},
  {stage:3, id:'t23', name:"To'liq olimpiada testi — 3",   icon:'ti-tournament'},
  {stage:3, id:'t24', name:"Qiyin masalalar tahlili",       icon:'ti-microscope'},
];

const DATA = {
t1: {
  theory: `
    <div class="theory-section">
      <div class="theory-box">
        <h3>🍬 Konfet misoli – tushuncha</h3>
        <p>Agar sizda 17 ta konfet bo'lib, 5 ta do'stingizga teng taqsimlamoqchi bo'lsangiz:</p>
        <ul>
          <li>Har bir do'stingizga <b>3 tadan</b> konfet berasiz (5 · 3 = 15)</li>
          <li>Sizda <b>2 ta</b> konfet ortib qoladi (17 − 15 = 2)</li>
        </ul>
        <p>Mana shu <b>ortib qolgan</b> son — <b>qoldiq</b> deyiladi!</p>
      </div>
      <div style="background:#f0faf6;border-radius:10px;padding:12px;text-align:center;margin:10px 0;font-size:20px;letter-spacing:2px">
        🍬🍬🍬🍬🍬 &nbsp; 🍬🍬🍬🍬🍬 &nbsp; 🍬🍬🍬🍬🍬 &nbsp; 🍬🍬<br>
        <span style="font-size:13px;color:#888">1-do'st &nbsp;&nbsp;&nbsp; 2-do'st &nbsp;&nbsp;&nbsp; 3-do'st &nbsp;&nbsp;&nbsp; ortib qoldi</span>
      </div>
    </div>

    <div class="theory-section">
      <div class="theory-box">
        <h3>📐 Asosiy formula (eslab qol!)</h3>
        <p>Har qanday <b>a</b> sonini <b>b</b> songa bo'lganda:</p>
      </div>
      <div class="formula-box">a = b · q + r &nbsp;&nbsp; (0 ≤ r < b)</div>
      <table class="theory-table">
        <tr><th>Belgi</th><th>Ma'nosi</th><th>Misolda</th></tr>
        <tr><td>a</td><td>Bo'linuvchi</td><td>17</td></tr>
        <tr><td>b</td><td>Bo'luvchi</td><td>5</td></tr>
        <tr><td>q</td><td>Bo'linma</td><td>3</td></tr>
        <tr><td>r</td><td>Qoldiq</td><td>2</td></tr>
      </table>
      <div class="warn-box">
        <p>🔴 <b>Muhim:</b> Qoldiq <b>har doim</b> bo'luvchidan kichik bo'lishi kerak!<br>
        <span style="font-size:13px;color:#555">Masalan: 25 ni 4 ga bo'lganda qoldiq 1 (chunki 25 = 4·6 + 1)</span></p>
      </div>
    </div>

    <div class="theory-section">
      <div class="theory-box">
        <h3>🧠 Tushunish uchun savollar (og'zaki)</h3>
        <ul>
          <li>25 ni 4 ga bo'lganda bo'linma va qoldiq? → 25 = 4·6 + 1 → bo'linma=6, qoldiq=1</li>
          <li>30 ni 7 ga bo'lganda? → 30 = 7·4 + 2 → bo'linma=4, qoldiq=2</li>
          <li>Qoldiq bo'luvchidan katta bo'lishi mumkinmi? → Yo'q!</li>
        </ul>
      </div>
    </div>

    <div class="theory-section">
      <div class="theory-box">
        <h3>📖 Yozilish usuli</h3>
        <p>"a ni b ga bo'lganda qoldiq r" deyishning qisqa usuli:</p>
      </div>
      <div class="formula-box">a ≡ r (mod b)</div>
      <div class="info-box">
        <p><b>Misol:</b> 17 ni 5 ga bo'lganda qoldiq 2 → 17 ≡ 2 (mod 5)</p>
        <p><b>Misol:</b> 38 ni 7 ga bo'lganda qoldiq 3 → 38 ≡ 3 (mod 7)</p>
      </div>
    </div>

    <div class="theory-section">
      <div class="theory-box">
        <h3>🔢 Qoldiq xossalari (muhim!)</h3>
        <ul>
          <li><b>Qo'shish:</b> (a + b) ni n ga bo'lgandagi qoldiq = (a qoldig'i + b qoldig'i) ni n ga bo'lgandagi qoldiq</li>
          <li><b>Ko'paytirish:</b> (a · b) ni n ga bo'lgandagi qoldiq = (a qoldig'i · b qoldig'i) ni n ga bo'lgandagi qoldiq</li>
          <li><b>Daraja:</b> a<sup>k</sup> ni n ga bo'lgandagi qoldiq = (a qoldig'i)<sup>k</sup> ni n ga bo'lgandagi qoldiq</li>
        </ul>
      </div>
      <div class="info-box">
        <p><b>Misol:</b> 17 ≡ 2 (mod 5), 13 ≡ 3 (mod 5)</p>
        <p>17 + 13 = 30 ≡ 2+3 = 5 ≡ 0 (mod 5) ✓</p>
        <p>17 · 13 = 221 ≡ 2·3 = 6 ≡ 1 (mod 5) ✓</p>
      </div>
    </div>

<div class="theory-box"><h3>Factorial</h3>
<p>n! = 1·2·3·4·····n &nbsp;&nbsp; (0! = 1, 1! = 1)</p></div>
<div class="info-box"><p>5! = 120 &nbsp;|&nbsp; 10! = 3628800 &nbsp;|&nbsp; Katta faktoriallar juda katta sonlar!</p></div>
</div>
<div class="theory-section">
<div class="theory-box"><h3>Legendre formulasi — n! dagi p ning darajasi</h3>
<p>n! ni p^k ga bo'lganda butun son hosil bo'lishi uchun k ning eng katta qiymati:</p></div>
<div class="formula-box">νₚ(n!) = ⌊n/p⌋ + ⌊n/p²⌋ + ⌊n/p³⌋ + ···</div>
<div class="info-box"><p><b>Misol: ν₃(138!)</b><br>
⌊138/3⌋ = 46<br>
⌊138/9⌋ = 15<br>
⌊138/27⌋ = 5<br>
⌊138/81⌋ = 1<br>
⌊138/243⌋ = 0 (to'xtatamiz)<br>
Jami: 46+15+5+1 = <b>67</b></p></div>
</div>
<div class="theory-section">
<div class="theory-box"><h3>n! dagi nollar soni</h3>
<p>n! ning oxirgi nollari soni = ν₅(n!) (chunki ν₂ > ν₅ har doim)</p></div>
<div class="formula-box">Nollar = ⌊n/5⌋ + ⌊n/25⌋ + ⌊n/125⌋ + ···</div>
<div class="info-box"><p>100! ning nollari: ⌊100/5⌋+⌊100/25⌋ = 20+4 = <b>24</b> ta nol</p></div>
</div>`,

theory:`<div class="theory-section">
<div class="theory-box"><h3>Uchburchak burchaklari</h3>
<p>Har qanday uchburchakda burchaklar yig'indisi <b>180°</b>.</p>
<p style="margin-top:6px">Tashqi burchak = qolgan ikki ichki burchak yig'indisi.</p></div>
</div>
<div class="theory-section">
<div class="theory-box"><h3>To'g'ri burchakli uchburchak</h3>
<ul>
<li>Pifagor teoremasi: <b>a² + b² = c²</b> (c — gipotenuz)</li>
<li>Pifagor uchliglar: (3,4,5), (5,12,13), (8,15,17)</li>
<li>Bissektrisa va median orasidagi burchak: |90° − burchak|/2</li>
</ul></div>
</div>
<div class="theory-section">
<div class="theory-box"><h3>Teng yonli uchburchak</h3>
<ul>
<li>Teng tomonlarining qarama-qarshi burchaklari teng</li>
<li>Asos bisektrisasi = medianasi = balandligi</li>
</ul></div>
</div>
<div class="theory-section">
<div class="theory-box"><h3>Uchburchak tomonlari tengsizligi</h3></div>
<div class="formula-box">|a − b| &lt; c &lt; a + b</div>
<div class="theory-box"><h3>Yuza formulalari</h3>
<p>S = ½·a·h &nbsp;|&nbsp; S = ½·a·b·sinC &nbsp;|&nbsp; S = √(p(p−a)(p−b)(p−c)) — Geron</p></div>
</div>`,
examples:[
{d:1,q:"Ikkita tomoni 20 mm va 24 sm bo'lgan uchburchakning 3-tomoni butun son. Eng katta qiymatini toping.",s:"20 mm = 2 sm. Tomonlar: 2, 24, x. |24−2| < x < 24+2 → 22 < x < 26. Butun qiymatlar: 23, 24, 25. Eng katta: 25 sm. Lekin tekshiramiz: 2+24=26 > 25 ✓",a:"Eng katta qiymat = 43 sm (agar 2dm=20sm bo'lsa: |24−20|<x<44, x=43)"},
{d:1,q:"To'g'ri burchakli uchburchakda bir burchak 38° bo'lsa, to'g'ri burchak uchidan tushirilgan bissektrisa va mediana orasidagi burchakni toping.",s:"To'g'ri burchakli uchburchak: 90°, 38°, 52°. Bissektrisa 90° ni ikkiga bo'ladi: 45°. Median gipotenuzga 90° ochiq uchburchakda gipotenuzning yarmiga teng. Burchak = |52°−38°|/2 = 7°",a:"7°"},
{d:2,q:"ABC uchburchakda AB=AC, BD=BC, ∠ABD=21°. ∠BAC ni toping.",s:"Teng yonli: ABC da AB=AC → ∠ABC=∠ACB. ∠ABD=21° → ∠DBC=∠ABC−21°. BCD teng yonli: ∠BDC=∠BCD. ∠ABC=∠ACB=α. ∠DBC=α−21°. ∠BDC=(180°−(α−21°))/2. ∠BAC=180°−2α. α=(180°−∠BDC)/1... Qadamli: ∠BDC=∠BCD=α−21°→∠DBC=180°−2(α−21°). Lekin ∠DBC=α−21° ham. Demak α−21°=180°−2α+42° → 3α=201° → α=67°. ∠BAC=180°−2·67°=46°",a:"∠BAC = 46°"},
{d:3,q:"ABCD trapetsiyasida BC=2, AB=CD=AF=5. Trapetsiya yuzini toping.",s:"Teng belli trapetsiya. CF balandlik. F — AD da. AF=5, AB=5 → BF=? BF²=AB²−AF²... Aslida: AB=5, AF=5 → F=A bo'lmaydi. To'g'ri: CF⊥AD, AF=5. ABF: AB=5, AF=5, BF=h. BC=2, CD=5. AD=AF+FD. CD²=CF²+FD²=AB²−AF²+... Simmetrik trapetsiya: AD uzoq asos. DF=(AD−BC)/2. AB²=h²+DF². h=√(AB²−DF²). Agar AF=5=AB=CD: DF=(AD−2)/2. h²=25−DF². Yuza=(BC+AD)/2·h. AF=5→F,D orasidagi masofa: FD=AD−5−? Bu masalada AD=AF+FD. Agar AD katta asos, F uning ichida: AD=AF+FD=5+FD. CD=5: h²+FD²=25. Yuza=(2+5+FD)/2·h. Simmetrik bo'lsa: DF=(AD−BC)/2=(5+FD−2)/2 ✓. FD=3, h=4. AD=8. Yuza=(2+8)/2·4=20",a:"Yuza = 20"},
],

<div class="theory-box"><h3>Kvadrat tengsizlik</h3>
<p>ax² + bx + c > 0 (yoki < 0) ko'rinishidagi tengsizlik.</p></div>
<div class="formula-box">D = b² − 4ac</div>
<div class="theory-box"><h3>Yeching:</h3>
<ul>
<li>1. Ildizlarni top: x₁ ≤ x₂</li>
<li>2. D > 0: parabola x₁ va x₂ da kesishadi</li>
<li>3. ax²+bx+c > 0: a>0 uchun x∈(−∞,x₁)∪(x₂,+∞)</li>
<li>4. ax²+bx+c < 0: a>0 uchun x∈(x₁,x₂)</li>
</ul></div>
</div>
<div class="theory-section">
<div class="theory-box"><h3>Ildizli tengsizliklar</h3></div>
<div class="formula-box">√f(x) &lt; g(x) &nbsp;↔&nbsp; { f(x)≥0; g(x)>0; f(x)&lt;g(x)² }</div>
<div class="formula-box">√f(x) &gt; g(x) &nbsp;↔&nbsp; { f(x)≥0; g(x)&lt;0 } ∪ { g(x)≥0; f(x)>g(x)² }</div>
</div>`,

theory:`<div class="theory-section">
<div class="theory-box"><h3>Simmetrik ifodalar</h3>
<p>x va y larni almashtirsa o'zgarmaydi. Asosiy simmetrik ifodalar: <b>s = x+y</b> va <b>p = xy</b></p></div>
<div class="formula-box">x² + y² = s² − 2p</div>
<div class="formula-box">x³ + y³ = s³ − 3sp = s(s²−3p)</div>
<div class="formula-box">x⁴ + y⁴ = (x²+y²)² − 2(xy)² = (s²−2p)² − 2p²</div>
<div class="formula-box">x³ − y³ = (x−y)(x²+xy+y²)</div>
</div>
<div class="theory-section">
<div class="theory-box"><h3>Uch o'zgaruvchili simmetrik ifodalar</h3>
<p>e₁=x+y+z, e₂=xy+yz+zx, e₃=xyz</p></div>
<div class="formula-box">x²+y²+z² = e₁² − 2e₂</div>
<div class="formula-box">x³+y³+z³ = e₁³ − 3e₁e₂ + 3e₃</div>
</div>`,
examples:[
{d:1,q:"x+y=5, xy=6 bo'lsa, x³+y³ ni toping.",s:"x³+y³ = (x+y)³−3xy(x+y) = 125−90 = 35",a:"x³+y³ = 35"},
{d:2,q:"x+y+x²y+xy²=24, x+y=5 bo'lsa, x³+y³ ni toping.",s:"x+y+xy(x+y)=24 → 5+5xy=24 → xy=19/5. x³+y³=5³−3·(19/5)·5=125−57=68",a:"x³+y³ = 68"},
{d:2,q:"x²+y²+xy=13, x+y=5 bo'lsa, x³+y³ ni toping.",s:"x²+y²=(x+y)²−2xy=25−2xy. 25−2xy+xy=13→xy=12. x³+y³=5(25−3·12)=5·(−11)? Yo'q: (x+y)(x²−xy+y²)=5(13−xy)=5(13−12)=5",a:"x³+y³ = 5"},
{d:3,q:"x+y+z=0 bo'lsa, x³+y³+z³ ni topish formulasini isbot kiling.",s:"x³+y³+z³−3xyz=(x+y+z)(x²+y²+z²−xy−yz−zx). x+y+z=0 → x³+y³+z³=3xyz",a:"x³+y³+z³ = 3xyz"},
],

t18:{
theory:`<div class="theory-section">
<div class="theory-box"><h3>Kabutar ini prinsipi (Dirichlet)</h3>
<p>Agar n ta "kabutar" m ta "in"ga joylashtirilsa va n > m bo'lsa, kamida bitta inda <b>2 ta yoki undan ko'p</b> kabutar bo'ladi.</div>
<div class="formula-box">n kabutar, m in, n > m → kamida bitta inda ≥ ⌈n/m⌉ kabutar</div>
</div>
<div class="theory-section">
<div class="theory-box"><h3>Kuchli versiya</h3>
<p>n ta elementni m ta guruhga joylashtirsak, kamida bir guruhda ⌈n/m⌉ ta element bor.</p></div>
<div class="info-box"><p><b>Misol:</b> 13 ta kishi — 12 oylik yil. Kamida 2 kishi bir oyda tug'ilgan.<br>
<b>Misol:</b> 5 ta raqam — 4 ta qoldiq (0,1,2,3) (mod 4). Kamida 2 ta raqam bir xil qoldiq beradi.</p></div>
</div>
<div class="theory-section">
<div class="theory-box"><h3>Qo'llanilishi</h3>
<ul>
<li>Sonlar nazariyasida: bir xil qoldiqli sonlar</li>
<li>Geometriyada: nuqtalar orasidagi masofa</li>
<li>Kombinatorikada: ranglar, guruhlar</li>
<li>"Kamida bittasi" turidagi isbot masalalari</li>
</ul></div>
</div>`,
examples:[
{d:1,q:"Sinfdagi 13 ta o'quvchi yilning 12 oyi bo'yicha taqsimlanadi. Kamida 2 tasi bir oyda tug'ilganini isbotlang.",s:"13 kabutar, 12 in. 13 > 12 → kabutar ini principi bo'yicha kamida bitta inda 2 ta kabutar bor.",a:"Isbot to'g'ri"},
{d:2,q:"5 ta natural son berilgan. Ulardan ikkitasining ayirmasi 4 ga bo'linishini isbotlang.",s:"4 ga bo'lganda qoldiqlar: 0,1,2,3 — 4 ta. 5 son, 4 qoldiq → kamida 2 ta son bir xil qoldiq beradi. Ayirmasi 4 ga bo'linadi.",a:"Isbot to'g'ri"},
{d:2,q:"Bir nechta bola 36 dona olmani yeyishmoqchi. Ali: har birimizda 5 tadan ko'p bo'lmaydi. Vali: hech birimiz olmasiz qolmaydi va barchada turlicha. Bolalar soni nechta?",s:"Vali sharti: turli miqdorlar, eng kami 1. Minimal holatda: 1+2+3+...+n = n(n+1)/2 ≤ 36. n=8: 36=36 ✓. Ali sharti: har biri ≤ 5. 8 bolada turli turli: 1,2,3,4,5,6,7,8 → eng katta 8 > 5 → 8 ta bola emas. 6 ta: 1+2+3+4+5+6=21 ≤ 36, lekin har biri ≤5: max 5 → max yig'indi=1+2+3+4+5+5=20 < 36 (bir xil). 8 ta: turli qiymatlar ≤5 bo'lishi mumkin emas (8 ta turli son ≤5 eng ko'pi: {1,2,3,4,5} — 5 ta). n=8 da emas. n=7: 1+2+3+4+5+6+7=28≤36, lekin 6,7>5. Demak n bolada turli qiymatlar ≤5: faqat {1,2,3,4,5} → 5 bola. Ali: 36/5 < 5, ya'ni har biri ≤5, 5 bola, jami=36/5=7.2 → 36 ni 5 ga taqsimlash: {8,8,8,7,5} emas turli. n=8: mumkin emas. Javob: n=9. 9 bola, turli miqdorlar ≤5 bo'lishi uchun kamida 9 ta turli qiymat: mumkin emas (0..5 = 6 qiymat). Qayta o'qing: Ali har biriga 5 tadan taqsimlayoladi, Vali turlicha. Vali uchun: 1+2+...+n ≤ 36 < 1+2+...+(n+1). n=8: 36=36 ✓. Demak bolalar soni 8.",a:"8 ta bola"},
{d:3,q:"100 ta musbat butun son berilgan, barchasi 200 dan kichik. Ikki sonning yig'indisi 201 bo'lishini isbotlang.",s:"Juftliklar: (1,200),(2,199),...,(100,101) — 100 ta juft. 100 son, 100 juft → kamida bitta juftdan ikkala a'zo tanlangan → yig'indisi 201.",a:"Isbot to'g'ri"},
],

<div class="theory-box"><h3>Arifmetik progressiya (AP)</h3>
<p>Har bir element oldingi elementdan doimiy <b>d</b> (qadami) ga farq qiladi.</p></div>
<div class="formula-box">aₙ = a₁ + (n−1)d</div>
<div class="formula-box">Sₙ = n(a₁+aₙ)/2 = n(2a₁+(n−1)d)/2</div>
<div class="theory-box"><h3>Xossalar</h3>
<ul>
<li>Har uchta ketma-ket a,b,c uchun: b = (a+c)/2</li>
<li>Simmetrik a'zolar yig'indisi teng: a₁+aₙ = a₂+aₙ₋₁ = ...</li>
<li>O'rta a'zo = o'rtacha qiymat</li>
</ul></div>
</div>`,

{d:3,q:"5 ta natural son ketma-ket AP hosil qiladi. Yig'indisi 2018. Oxirgi son eng kichik bo'lsa qancha?",s:"5 ta: a−2d, a−d, a, a+d, a+2d. Yig'indi = 5a = 2018? 2018 5 ga bo'linmaydi. Qayta: ketma-ket a, a+d, ... → yig'indi 5a+10d=2018 → bu ham emas. Ikkinchi sondan: b,b+d,b+2d,b+3d,b+4d → 5b+10d=2018 → 5(b+2d)=2018 → 2018 5 ga bo'linmaydi. Demak masalada boshqa son. Eng kichik oxirgi: b+4d minimallash uchun d<0, |d| maksimal. Bu ochiq masala.",a:"Berilgan holda yig'indi 2018 bo'lishi mumkin emas (5 ga bo'linmaydi)"},

let done = {};
try { done = JSON.parse(localStorage.getItem('olimp_done')||'{}'); } catch(e) {}
let curTopic = null;

function saveDone() {
  try { localStorage.setItem('olimp_done', JSON.stringify(done)); } catch(e) {}
}

function renderHome() {
  [1,2,3].forEach(s=>{
    const el = document.getElementById('grid-stage'+s);
    if(!el) return;
    const tps = TOPICS.filter(t=>t.stage===s);
    el.innerHTML = tps.map(t=>`
      <button class="topic-btn ${done[t.id]?'done':''}" onclick="openTopic('${t.id}')">
        <i class="ti ${t.icon} t-icon"></i>
        <span class="t-name">${t.name}</span>
        <i class="ti ti-check t-check" ${done[t.id]?'style="opacity:1"':''}></i>
      </button>`).join('');
  });
  const n = Object.values(done).filter(Boolean).length;
  document.getElementById('stat-done').textContent = n;
  document.getElementById('stat-pct').textContent = Math.round(n/24*100)+'%';
  const pbar = document.getElementById('main-pbar');
  if(pbar) pbar.style.width = Math.round(n/24*100)+'%';
}

function openTopic(id) {
  const t = TOPICS.find(x=>x.id===id);
  if(!t) return;
  curTopic = id;
  document.getElementById('lesson-title').textContent = t.name;
  document.getElementById('nav-lesson-title').textContent = t.name.length > 18 ? t.name.slice(0,18)+'…' : t.name;
  document.getElementById('nav-lesson').style.display = '';
  const db = document.getElementById('done-badge');
  db.style.display = done[id] ? '' : 'none';
  const d = DATA[id];
  if(d) {
    buildTheory(d.theory);
    buildExamples(d.examples);
    buildHomework(d.homework);
    buildTest(d.test);
  }
  showPage('lesson');
  showTab(document.querySelector('.tab-btn'), 'theory');
}

function buildTheory(html) {
  document.getElementById('tab-theory').innerHTML = html || '<p style="color:#888">Tez orada qo\'shiladi.</p>';
}

function buildExamples(arr) {
  if(!arr||!arr.length){ document.getElementById('tab-examples').innerHTML='<p style="color:#888">Tez orada.</p>'; return; }
  const labels=['','Oson','O\'rtacha','Qiyin'];
  const cols=['d-easy','d-med','d-hard'];
  document.getElementById('tab-examples').innerHTML =
    `<div class="examples-label"><i class="ti ti-pencil"></i> ${arr.length} ta namuna masala</div>` +
    arr.map((e,i)=>`
    <div class="example-card">
      <div class="diff-row">
        ${[1,2,3].map(x=>`<div class="diff-dot ${x<=e.d?cols[x-1]:''}"></div>`).join('')}
        <span class="diff-label">${labels[e.d]||''}</span>
      </div>
      <div class="ex-q">${i+1}. ${e.q}</div>
      <div class="ex-sol"><strong>Yechim:</strong> ${e.s}</div>
      <span class="ex-ans">Javob: ${e.a}</span>
    </div>`).join('');
}

function buildHomework(arr) {
  if(!arr||!arr.length){ document.getElementById('tab-homework').innerHTML='<p style="color:#888">Tez orada.</p>'; return; }
  document.getElementById('tab-homework').innerHTML =
    `<div class="hw-intro"><i class="ti ti-info-circle" style="flex-shrink:0;margin-top:2px"></i> <span>Har bir masalani to'liq yechim bilan daftarga yozing. Olimpiadada jarayon muhim!</span></div>` +
    arr.map((h,i)=>`
    <div class="hw-card">
      <span class="hw-type ${h.t==='req'?'hw-req':'hw-olp'}">${h.t==='req'?'Majburiy':'★ Olimpiada'}</span>
      <div class="hw-q">${i+1}. ${h.q}</div>
    </div>`).join('') +
    `<button class="mark-done-btn" onclick="markDone()"><i class="ti ti-check"></i> Bajarildi — belgilash</button>`;
}

let testState = {};
function buildTest(arr) {
  testState = { questions: arr, answers: {}, submitted: false };
  if(!arr||!arr.length){ document.getElementById('tab-test').innerHTML='<p style="color:#888">Tez orada.</p>'; return; }
  document.getElementById('tab-test').innerHTML =
    `<div class="test-intro"><i class="ti ti-clock"></i> ${arr.length} ta savol. Diqqat bilan o'qing!</div>` +
    arr.map((q,qi)=>`
    <div class="test-q-card" id="tqc-${qi}">
      <div class="test-qtext">${qi+1}. ${q.q}</div>
      <div class="test-opts">
        ${q.o.map((o,oi)=>`<button class="test-opt" id="topt-${qi}-${oi}" onclick="selectOpt(${qi},${oi})">${o}</button>`).join('')}
      </div>
    </div>`).join('') +
    `<button class="submit-btn" onclick="submitTest()"><i class="ti ti-check"></i> Natijani ko'rish</button>
     <div class="test-result-box" id="test-result"></div>`;
}

function selectOpt(qi,oi) {
  if(testState.submitted) return;
  const prev = testState.answers[qi];
  if(prev !== undefined) {
    const pb = document.getElementById('topt-'+qi+'-'+prev);
    if(pb) pb.className = 'test-opt';
  }
  testState.answers[qi] = oi;
  const btn = document.getElementById('topt-'+qi+'-'+oi);
  if(btn) btn.className = 'test-opt selected';
}

function submitTest() {
  if(testState.submitted) return;
  testState.submitted = true;
  const qs = testState.questions;
  let score = 0;
  qs.forEach((q,qi)=>{
    const chosen = testState.answers[qi];
    for(let oi=0;oi<q.o.length;oi++){
      const btn = document.getElementById('topt-'+qi+'-'+oi);
      if(!btn) continue;
      btn.disabled = true;
      if(oi === q.a) btn.className = 'test-opt correct';
      else if(oi === chosen && oi !== q.a) btn.className = 'test-opt wrong';
      else btn.className = 'test-opt';
    }
    if(chosen === q.a) score++;
  });
  const total = qs.length;
  const pct = Math.round(score/total*100);
  const res = document.getElementById('test-result');
  res.style.display = 'block';
  if(pct >= 80) { res.className='test-result-box result-good'; }
  else if(pct >= 50) { res.className='test-result-box result-mid'; }
  else { res.className='test-result-box result-bad'; }
  res.innerHTML = `<div class="result-score">${score}/${total}</div>
    <div class="result-msg">${pct}% — ${pct>=80?'Ajoyib natija! 🏆':pct>=50?'Yaxshi, lekin mashq qilish kerak 💪':'Ko\'proq o\'qish kerak. Nazariyani qaytaring 📖'}</div>`;
}

function markDone() {
  if(!curTopic) return;
  done[curTopic] = true;
  saveDone();
  document.getElementById('done-badge').style.display = '';
  renderHome();
  alert('✓ Bajarildi deb belgilandi!');
}

function showPage(p) {
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  const nb = document.getElementById('nav-'+p);
  if(nb) nb.classList.add('active');
  if(p==='progress') renderProgress();
  if(p==='home') renderHome();
  window.scrollTo(0,0);
}

function showTab(btn, name) {
  document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
}

function renderProgress() {
  const stages = [
    {label:'1–2-oy: Poydevor', topics: TOPICS.filter(t=>t.stage===1)},
    {label:'3–4-oy: Olimpiada usullari', topics: TOPICS.filter(t=>t.stage===2)},
    {label:'5–6-oy: Musobaqa rejimi', topics: TOPICS.filter(t=>t.stage===3)},
  ];
  document.getElementById('prog-content').innerHTML = stages.map(s=>`
    <div class="prog-stage">
      <div class="prog-stage-title">${s.label}</div>
      ${s.topics.map(t=>`
        <div class="prog-item">
          <div class="prog-circle ${done[t.id]?'done':''}">
            ${done[t.id]?'<i class="ti ti-check" style="font-size:11px"></i>':''}
          </div>
          <span class="prog-name">${t.name}</span>
          ${done[t.id]?'<span class="prog-tag">Bajarildi</span>':''}
        </div>`).join('')}
    </div>`).join('');
}

renderHome();
</script>
</body>
</html>
